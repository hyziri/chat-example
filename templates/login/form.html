<div class="card">
    <div class="card-title">
        <h2>Welcome Back</h2>
        <p style="color: var(--accent)">Sign in to continue chatting</p>
    </div>

    <form id="login-form" hx-post="/login" hx-swap="none">
        <div class="form-group">
            <label for="login-email">Email *</label>
            <input
                type="email"
                id="login-email"
                name="email"
                required
                placeholder="Enter your email"
                autofocus
            />
        </div>

        <div class="form-group">
            <label for="login-password">Password *</label>
            <input
                type="password"
                id="login-password"
                name="password"
                required
                placeholder="Enter your password"
            />
        </div>

        <div id="login-error" class="error-message" style="display: none"></div>

        <div>
            <button type="submit" class="btn btn-primary btn-full">
                Sign In
            </button>
        </div>
    </form>

    <div style="color: var(--accent); margin-top: 1.5rem">
        <p>
            Don't have an account?
            <a
                href="/register"
                hx-get="/register"
                hx-target="#page"
                hx-swap="outerHTML"
                hx-push-url="true"
                preload="mouseover"
            >
                Create one
            </a>
        </p>
    </div>
</div>
